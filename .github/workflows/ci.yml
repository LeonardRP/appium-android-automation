name: Android Automation Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. Instalar dependências do projeto
      - name: Install project dependencies
        run: npm install

      # 4. Instalar Appium globalmente
      - name: Install Appium and Appium doctor
        run: npm install -g appium appium-doctor

      # 5. Instalar driver UIAutomator2
      - name: Install Appium UIAutomator2 driver
        run: appium driver install uiautomator2

      # 6. Instalar Android SDK e criar emulador
      - name: Setup Android SDK and emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          force-avd-creation: true
          script: echo "skip"

      # 7. Verificar Appium e Android
      - name: Verify Appium and Android environment
        run: |
          appium-doctor
          appium --version
          adb --version
          echo "Installed Appium drivers:"
          appium driver list --installed

      # 8. Start Appium server in background
      - name: Start Appium server
        run: |
          nohup appium --port 4724 > appium.log 2>&1 &
          echo "Waiting for Appium to start..."
          sleep 15  # garante que Appium iniciou

      # 9. Run WebDriverIO tests
      - name: Run WebDriverIO tests
        run: npx wdio run wdio.conf.js --spec ./test/specs/flow.e2e.js

      # 10. Upload test reports
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wdio-reports
          path: ./reports