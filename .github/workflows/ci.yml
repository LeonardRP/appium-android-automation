name: Android Automation Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest
    env:
      ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 120

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. Install dependencies
      - name: Install project dependencies
        run: npm ci

      # 4. Install Appium and UIAutomator2 driver
      - name: Install Appium and UIAutomator2 driver
        run: |
          npm install -g appium appium-doctor
          appium driver install uiautomator2

      # 5. Setup Android Emulator sem Play Store
      - name: Setup Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect -no-snapshot-load
          script: echo "skip"  # <---- O parâmetro script é obrigatório

      # 6. Verify Appium and Android
      - name: Verify Appium and Android
        run: |
          appium-doctor
          appium --version
          adb --version
          echo "Installed Appium drivers:"
          appium driver list --installed

      # 7. Run WebDriverIO tests
      - name: Run WebDriverIO tests
        run: npx wdio run wdio.conf.js --spec ./test/specs/flow.e2e.js

      # 8. Upload test reports
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wdio-reports
          path: ./reports